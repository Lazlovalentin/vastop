sonar.projectKey=vastai-operator
sonar.projectName=vastai-operator

# Layout
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.11,3.12,3.13,3.14

# Coverage (generated by: pytest --cov=vastai_operator --cov-report=xml:coverage.xml)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated/vendored paths from analysis
sonar.exclusions=**/__pycache__/**,**/*.pyc,.venv/**,deploy/**
sonar.coverage.exclusions=tests/**,src/vastai_operator/__main__.py

# Encoding
sonar.sourceEncoding=UTF-8
