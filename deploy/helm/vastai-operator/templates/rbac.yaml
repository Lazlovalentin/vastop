{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vastai-operator.fullname" . }}
  labels:
    {{- include "vastai-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings, kopfpeerings]
    verbs: [list, watch, patch, get]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch, get]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch, get]
  # The operator only reads individual API-key / Slack-webhook secrets by name
  # (resolver.resolve_api_key, alert._read_webhook). Least privilege: `get`
  # only — never list/watch, so it cannot enumerate secrets cluster-wide.
  # Cluster scope is required because CRs (and their secrets) live in any
  # namespace under clusterwide reconciliation.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [vast.ai]
    resources:
      - vastinstances
      - vastinstances/status
      - vastinstances/finalizers
      - vastorders
      - vastorders/status
      - vastorders/finalizers
      - vasttemplates
      - vasttemplates/status
      - vasttemplates/finalizers
      - vastalerts
      - vastalerts/status
      - vastalerts/finalizers
      - vastenvvars
      - vastenvvars/status
      - vastenvvars/finalizers
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vastai-operator.fullname" . }}
  labels:
    {{- include "vastai-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vastai-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vastai-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
