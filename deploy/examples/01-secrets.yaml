apiVersion: v1
kind: Secret
metadata:
  name: vastai-credentials
  namespace: default
type: Opaque
stringData:
  VAST_API_KEY: REPLACE_WITH_YOUR_VAST_API_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-webhook
  namespace: default
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK
