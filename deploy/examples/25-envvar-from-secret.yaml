# Account-level Vast.ai environment variable sourced from a Kubernetes Secret —
# the value never appears in the CR. The reconcile timer re-pushes to Vast.ai
# when the resolved value drifts from the last-synced hash (e.g. Secret rotated),
# so bump/rotate the Secret and the operator catches up within one sync cycle.
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: default
type: Opaque
stringData:
  token: REPLACE_WITH_HUGGING_FACE_TOKEN
---
apiVersion: vast.ai/v1alpha1
kind: VastEnvVar
metadata:
  name: hugging-face-token
  namespace: default
spec:
  key: HUGGING_FACE_HUB_TOKEN
  valueFrom:
    secretKeyRef:
      name: hf-token
      key: token
  apiKeySecretRef:
    name: vastai-credentials
