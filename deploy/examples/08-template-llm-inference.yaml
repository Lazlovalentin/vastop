apiVersion: vast.ai/v1alpha1
kind: VastTemplate
metadata:
  name: vllm-serve
  namespace: default
spec:
  image: vllm/vllm-openai:latest
  runtype: args
  diskGB: 80
  description: vLLM OpenAI-compatible inference server.
  env:
    HUGGING_FACE_HUB_TOKEN: ""
    MODEL_NAME: meta-llama/Llama-3.1-8B-Instruct
  onstart: |
    python -m vllm.entrypoints.openai.api_server \
      --model "${MODEL_NAME}" \
      --host 0.0.0.0 \
      --port 8000
  apiKeySecretRef:
    name: vastai-credentials
