apiVersion: v1
kind: ServiceAccount
metadata:
  name: vastai-operator
  namespace: vastai-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vastai-operator
rules:
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings, kopfpeerings]
    verbs: [list, watch, patch, get]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch, get]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch, get]
  # The operator only reads individual API-key / Slack-webhook secrets by
  # name (resolver.resolve_api_key, alert._read_webhook → read_namespaced_secret).
  # Least privilege: `get` only — never list/watch, so it cannot enumerate
  # secrets cluster-wide. Cluster scope is required because CRs (and their
  # secrets) live in any namespace under --all-namespaces.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
  - apiGroups: [vast.ai]
    resources:
      - vastinstances
      - vastinstances/status
      - vastinstances/finalizers
      - vastorders
      - vastorders/status
      - vastorders/finalizers
      - vasttemplates
      - vasttemplates/status
      - vasttemplates/finalizers
      - vastalerts
      - vastalerts/status
      - vastalerts/finalizers
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vastai-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vastai-operator
subjects:
  - kind: ServiceAccount
    name: vastai-operator
    namespace: vastai-operator-system
